name: Semantic Release

# Runs semantic-release when a maintainer pushes to a release/x.y branch.
# semantic-release analyses commits since the last tag, bumps the version,
# updates CHANGELOG.md + package.json, commits them, and pushes a vX.Y.Z tag.
# That tag push then triggers the publish.yml npm workflow.
#
# Required secrets: GH_TOKEN (PAT with contents: write)
# No NPM_TOKEN needed — npmPublish is disabled; publish.yml handles that via OIDC.

on:
  push:
    branches:
      - 'release/[0-9]+.x'
      - 'release/[0-9]+.[0-9]+.x'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - '.releaserc.json'
      - '.github/workflows/semver.yml'

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
